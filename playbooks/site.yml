---
- name: Prepare all Locust nodes
  hosts: all
  become: true
  gather_facts: true
  roles:
    - common

- name: Configure Locust master
  hosts: locust_master
  become: true
  gather_facts: true
  roles:
    - master

- name: Configure Locust workers
  hosts: locust_workers
  become: true
  gather_facts: true
  roles:
    - swap
    - worker
