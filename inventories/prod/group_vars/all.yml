---
locust_version: "2.45.0"
locust_home: /opt/locust
locust_venv: /opt/locust/venv
locust_log_dir: /var/log/locust
locust_master_host: "{{ hostvars[groups['locust_master'][0]].ansible_host | default(groups['locust_master'][0]) }}"
locust_master_port: 5557
locust_web_host: 0.0.0.0
locust_web_port: 8089
locust_enable_rebalancing: true
locust_target_host: "https://auth.poc.dcloud.biz.id"

# Otomatisasi jumlah proses worker:
# safe mode: sisakan 1 vCPU untuk kernel/network/heartbeat.
# Set 0 jika ingin memakai seluruh vCPU.
locust_worker_reserved_cpu_cores: 1
locust_worker_reserved_memory_mb: 2048
locust_worker_memory_per_process_mb: 768
locust_worker_process_cap: 64
locust_worker_min_processes: 1

# Swap pada setiap worker.
swap_size_mb: 2048
swap_file: /swapfile
swap_swappiness: 10

# Hardening/resource limits.
locust_limit_nofile: 1048576
locust_limit_nproc: 131072
locust_restart_sec: 2

# Ubuntu 22.04/24.04.
common_packages:
  - python3
  - python3-venv
  - python3-pip
  - python3-setuptools
  - python3-wheel
  - curl
  - jq
  - git
  - rsync
  - sysstat
  - htop
  - iproute2
  - netcat-openbsd
  - ca-certificates

locust_healthcheck_enabled: false
healthcheck_domains:
  - auth.poc.dcloud.biz.id
  - catalog.poc.dcloud.biz.id
  - cart.poc.dcloud.biz.id
  - checkout.poc.dcloud.biz.id
  - order.poc.dcloud.biz.id
